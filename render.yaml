services:
  - type: web
    name: dubai-realestate-graph-mcp
    env: python
    plan: free
    buildCommand: "pip install -r webapp/requirements.txt"
    startCommand: "python -m uvicorn webapp.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.10"
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4o
      - key: NEO4J_URI
        sync: false
      - key: NEO4J_USER
        value: neo4j
      - key: NEO4J_PASSWORD
        sync: false
      - key: APP_PASSWORD
        sync: false
      - key: SESSION_SECRET
        sync: false
      - key: COOKIE_SECURE
        value: "true"
