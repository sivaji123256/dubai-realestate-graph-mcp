<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Dubai Real Estate Graph Assistant</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <div id="login-screen" class="screen">
    <form id="login-form" class="login-card">
      <h1>Dubai Real Estate Graph Assistant</h1>
      <p class="subtitle">Ask about Dubai's property market, backed by real DLD transaction data.</p>
      <input id="password-input" type="password" placeholder="Password" autocomplete="current-password" required />
      <button type="submit">Enter</button>
      <p id="login-error" class="error"></p>
    </form>
  </div>

  <div id="chat-screen" class="screen hidden">
    <header>
      <h1>Dubai Real Estate Graph Assistant</h1>
      <p class="subtitle">Live Neo4j graph of official DLD Sales transactions</p>
    </header>
    <main id="messages"></main>
    <form id="chat-form">
      <input id="chat-input" type="text" placeholder="e.g. Compare Marsa Dubai and Palm Jumeirah" autocomplete="off" />
      <button type="submit">Send</button>
    </form>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
