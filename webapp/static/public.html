<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AqarIQ — Free Dubai Real Estate Assistant</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%230b1220'/%3E%3Ctext x='50' y='68' font-size='58' font-family='Georgia,serif' font-weight='bold' fill='%23c9a24b' text-anchor='middle'%3EA%3C/text%3E%3C/svg%3E" />
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <div id="public-screen" class="screen">
    <header class="public-header">
      <div class="brand-mark">Aqar<span>IQ</span></div>
      <p class="subtitle">Free Dubai real-estate market assistant — live data from official DLD transactions</p>
      <p class="disclaimer">AqarIQ provides market information only — it isn't a licensed broker. For viewings, offers, or paperwork, we'll point you to the developer's official sales team.</p>
    </header>
    <main class="content public-content">
      <div id="quick-prompts" class="quick-prompts"></div>
      <div id="messages"></div>
      <form id="chat-form">
        <input id="chat-input" type="text" placeholder="e.g. What's the market like in Business Bay?" autocomplete="off" />
        <button type="submit">Send</button>
      </form>
    </main>
  </div>

  <script src="/static/public.js"></script>
</body>
</html>
